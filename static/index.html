<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BenX AI Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <main class="frame">
    <h1 class="title">BenX</h1>

    <section class="layout">
      <aside class="panel left-panel glass-panel">
        <h2 class="glow-text">SYSTEM MONITOR</h2>
        
        <div class="chart-container">
          <h3>CPU USAGE</h3>
          <canvas id="cpuChart"></canvas>
          <div class="stat-value" id="cpuValue">0%</div>
        </div>
        
        <div class="chart-container">
          <h3>RAM USAGE</h3>
          <canvas id="ramChart"></canvas>
          <div class="stat-value" id="ramValue">0%</div>
        </div>
        
        <div class="chart-container">
          <h3>NETWORK TRAFFIC</h3>
          <canvas id="networkChart"></canvas>
          <div class="stat-value" id="networkValue">0 KB/s</div>
        </div>
        
        <div class="chart-container">
          <h3>GPU LOAD</h3>
          <canvas id="gpuChart"></canvas>
          <div class="stat-value" id="gpuValue">0%</div>
        </div>
        
        <div class="chart-container">
          <h3>TEMPERATURE</h3>
          <canvas id="tempChart"></canvas>
          <div class="stat-value" id="tempValue">0°C</div>
        </div>
        
        <div class="clock" id="clock">00:00:00</div>
      </aside>

      <section class="center-stage" aria-label="BenX symbol stage">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>

        <div class="logo-wrap">
          <div class="ring outer"></div>
          <div class="ring inner"></div>
          <div class="benx-mark"></div>
        </div>
      </section>

      <aside class="panel right-panel glass-panel">
        <h2>CHAT</h2>
        <div class="chat-window">
          <p><span class="timestamp" id="chatTs">[00:00:00]</span> BenX:</p>
          <p>Hello! I'm BenX, your AI assistant. How can I help you?</p>
        </div>
        <input class="chat-input" type="text" aria-label="chat input" />
        <div class="actions">
          <button>SEND</button>
          <button>VOICE</button>
          <button class="danger">CLEAR</button>
        </div>
      </aside>
    </section>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
